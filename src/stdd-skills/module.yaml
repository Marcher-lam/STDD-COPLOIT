# STDD Skills Module
# Version: 1.0.0

name: stdd-skills
version: "1.0.0"
description: STDD Copilot Skills - 按开发阶段组织的技能模块

# 模块依赖
dependencies: []

# 阶段定义
phases:
  - id: 1-proposal
    name: 提案阶段
    description: 需求收集、澄清和提案
    skills:
      - stdd-new
      - stdd-explore
      - stdd-clarify
      - stdd-confirm

  - id: 2-specification
    name: 规格阶段
    description: 生成行为规格和 API 规范
    skills:
      - stdd-spec
      - stdd-api-spec
      - stdd-schema
      - stdd-contract

  - id: 3-design
    name: 设计阶段
    description: 技术设计和任务拆解
    skills:
      - stdd-design
      - stdd-prp
      - stdd-plan

  - id: 4-implementation
    name: 实现阶段
    description: TDD 循环实现
    skills:
      - stdd-apply
      - stdd-outside-in
      - stdd-mock
      - stdd-factory
      - stdd-iterate

  - id: 5-verification
    name: 验证阶段
    description: 质量验证和归档
    skills:
      - stdd-verify
      - stdd-mutation
      - stdd-validate
      - stdd-metrics
      - stdd-archive

# 工作流定义
workflows:
  - name: core
    description: 核心工作流 - 简单需求快速通道
    path: new → apply → archive

  - name: expanded
    description: 扩展工作流 - 复杂需求完整流程
    path: new → ff/continue → apply → verify → archive

  - name: explore-first
    description: 探索先行 - 需求表达不出来
    path: explore → new → continue → apply → archive

# 配置
config:
  default_workflow: core
  enable_parallel: true
  enable_memory: true
  enable_metrics: true
